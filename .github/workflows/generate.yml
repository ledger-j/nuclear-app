name: Nuclear Monitor Kernel

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

# Grant write access to repository contents so the kernel can push latest.json
permissions:
  contents: write

jobs:
  generate-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Smart Kernel (Generate Data)
      run: |
        python backend/generate_data.py

    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Nuclear Sentinel Bot"
        git add frontend/data/latest.json frontend/data/history.json
        git diff --cached --quiet || git commit -m "chore: update monitor data [skip ci]"
        git push
